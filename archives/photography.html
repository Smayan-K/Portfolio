<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    /* Gallery-specific styles (same as before) */
    .gallery-header {
      padding: 2rem 6vw 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .gallery-header h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }
    .gallery-header .report-tag {
      margin-bottom: 0.5rem;
    }
    .gallery-description {
      max-width: 700px;
      color: var(--muted);
      margin: 1rem 0 2rem 6vw;
      font-family: 'Merriweather', serif;
      line-height: 1.6;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem 6vw 4rem;
    }
    .gallery-item {
      background: white;
      border-left: 4px solid var(--accent);
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      transition: transform 0.2s ease;
      cursor: pointer;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gallery-item:hover {
      transform: translateY(-4px);
    }
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: sepia(0.2) contrast(0.95);
      transition: filter 0.3s ease;
    }
    .gallery-item:hover img {
      filter: sepia(0) contrast(1);
    }

    /* Lightbox (unchanged) */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border: 6px solid white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .lightbox-close {
      position: absolute;
      top: 2rem;
      right: 2rem;
      font-family: 'Space Mono', monospace;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: rgba(0,0,0,0.5);
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid white;
    }
    .lightbox-close:hover {
      background: var(--accent);
    }
    .lightbox-nav {
      position: absolute;
      bottom: 2rem;
      display: flex;
      gap: 2rem;
    }
    .lightbox-nav button {
      background: rgba(255,255,255,0.2);
      border: 1px solid white;
      color: white;
      font-family: 'Space Mono', monospace;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
      letter-spacing: 0.15em;
    }
    .lightbox-nav button:hover {
      background: var(--accent);
    }
    footer {
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <a href="/" style="text-decoration: none; color: inherit;">
    <div class="logo">PORTFOLIO - SMAYAN K.</div>
  </a>
  <nav>
    <a href="../archives/index.html">ARCHIVES</a>
  </nav>
</header>

<div class="gallery-header">
  <div class="report-tag">PHOTOGRAPHY ARCHIVE · v1.0</div>
  <h1>Personal Photography Collection</h1>
</div>

<div class="gallery-description">
  A curated selection of personal photography — landscapes, urban scenes, portraits, and experimental shots. 
  Click any image to enlarge and browse the gallery.
</div>

<!-- Gallery Grid -->
<div class="gallery-grid" id="galleryGrid">
  <!-- Images will be populated by JavaScript -->
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-nav">
    <button id="lightboxPrev">← PREV</button>
    <button id="lightboxNext">NEXT →</button>
  </div>
</div>

<footer>
  © 2003–<span id="year"></span> Smayan Kartha — Project Portfolio
</footer>

<script>
  // Update footer year
  document.getElementById('year').textContent = new Date().getFullYear();

  // ============================================================
  // IMAGE LIST – EACH ENTRY REQUIRES:
  //   src  : path to full‑size image (used in lightbox)
  //   thumb: path to optimised thumbnail (displayed in grid)
  //
  // HOW TO GENERATE THUMBNAILS (choose one method):
  //
  // 1. Manual (using ImageMagick):
  //    Create a 'thumbnails' folder inside your photography folder.
  //    Run: for img in *.jpg; do convert $img -resize 400x thumbnails/$img; done
  //
  // 2. Automated build script (Node.js with Sharp):
  //    const sharp = require('sharp');
  //    const fs = require('fs');
  //    fs.readdirSync('images/photography').forEach(file => {
  //      sharp(`images/photography/${file}`)
  //        .resize(400, 300, { fit: 'cover' })
  //        .toFile(`images/photography/thumbnails/${file}`);
  //    });
  //
  // 3. Online bulk converter (e.g., https://bulkresizephotos.com/)
  //
  // Then update the 'images' array below with correct paths.
  // ============================================================

  const images = [
    { src: 'images/photography/photo1.jpg', thumb: 'images/photography/thumbnails/photo1.jpg' },
    { src: 'images/photography/photo2.jpg', thumb: 'images/photography/thumbnails/photo2.jpg' },
    { src: 'images/photography/photo3.jpg', thumb: 'images/photography/thumbnails/photo3.jpg' },
    { src: 'images/photography/photo4.jpg', thumb: 'images/photography/thumbnails/photo4.jpg' },
    { src: 'images/photography/photo5.jpg', thumb: 'images/photography/thumbnails/photo5.jpg' },
    // Add more as needed
  ];

  // Populate gallery with thumbnails
  const gallery = document.getElementById('galleryGrid');
  images.forEach((img, index) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.dataset.index = index;
    item.innerHTML = `<img src="${img.thumb}" alt="Photograph ${index+1}" loading="lazy">`;
    item.addEventListener('click', () => openLightbox(index));
    gallery.appendChild(item);
  });

  // Lightbox functionality
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');
  const lightboxPrev = document.getElementById('lightboxPrev');
  const lightboxNext = document.getElementById('lightboxNext');

  let currentIndex = 0;

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const img = images[currentIndex];
    lightboxImg.src = img.src;   // full-size image
  }

  lightboxClose.addEventListener('click', closeLightbox);

  lightboxPrev.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateLightbox();
  });

  lightboxNext.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % images.length;
    updateLightbox();
  });

  // Close lightbox when clicking outside image
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxPrev.click();
    if (e.key === 'ArrowRight') lightboxNext.click();
  });
</script>
</body>
</html>
